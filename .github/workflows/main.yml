name: CI Pipeline

# This tells GitHub when to run this workflow
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # The type of virtual machine to use

    steps:
      # Step 1: Get the code from the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # We use Node 20
          cache: "npm" # Caches dependencies to make future runs faster

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Check for code quality issues (Linting)
      - name: Run Linter
        run: npm run lint

      # Step 5: Make sure the project can build successfully
      - name: Build Project
        run: npm run build
